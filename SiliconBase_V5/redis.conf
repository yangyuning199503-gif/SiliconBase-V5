# Redis 配置文件 - SiliconBase V5
# 优化配置：持久化 + 内存限制

# ========================================
# 基础配置
# ========================================
port 6379
bind 0.0.0.0
daemonize no

# ========================================
# 内存管理（关键！）
# ========================================
# 最大内存限制（根据U盘容量调整）
maxmemory 256mb

# 内存淘汰策略：最近最少使用
maxmemory-policy allkeys-lru

# ========================================
# 持久化配置（数据不会丢）
# ========================================
# RDB快照（定期保存到磁盘）
save 900 1      # 900秒内1次修改则保存
save 300 10     # 300秒内10次修改则保存
save 60 10000   # 60秒内10000次修改则保存

dbfilename dump.rdb
dir /data

# AOF持久化（更可靠，每秒写入）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec  # 每秒同步，性能和可靠性平衡

# ========================================
# 过期策略
# ========================================
# 定期删除过期key，释放内存
hz 10

# ========================================
# 日志（方便排查问题）
# ========================================
loglevel notice
logfile ""
