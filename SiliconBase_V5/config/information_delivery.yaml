# SiliconBase V5 - 信息投递配置
# Token预算管理与内容组装策略
# 
# 总Token预算: 10200 tokens（基于典型4K上下文模型，已翻倍）
# 分配策略: 8大类别，按信息优先级分配
# 【Phase 8修复】基础设定从800提升到3000，防止system_prompt被严重截断

information_delivery:
  version: "2.0.0"
  description: "Token预算管理与信息投递配置（Phase 8放大版）"
  
  # Token预算配置
  token_budget:
    # 总预算（参考值）
    total: 10200
    
    # 各类别预算分配
    allocation:
      # 基础设定: 系统提示词、三观、生命体征
      # 优先级: 最高（必须完整保留）
      基础设定: 3000
      
      # 感知输入: 感知上下文、视觉分析结果
      # 优先级: 高（直接影响当前决策）
      感知输入: 1200
      
      # 记忆经验: L1-L5记忆、反思、经验、执行历史
      # 优先级: 高（但可压缩/截断）
      记忆经验: 2400
      
      # 认知辅助: 世界模型、探索结果、层级提示、推理框架
      # 优先级: 中（可动态调整）
      认知辅助: 2000
      
      # 任务管理: 阶段锚点、任务状态
      # 优先级: 中
      任务管理: 1600
      
      # 个性化: 用户偏好、个性化设置
      # 优先级: 低（可压缩）
      个性化: 200
      
      # 弱连接: 主动服务提示、弱连接触发
      # 优先级: 低（超出预算时可移除）
      弱连接: 200
      
      # 预留: 用户输入、AI输出缓冲
      # 优先级: 必须保留
      预留: 800
  
  # 截断策略配置
  truncation:
    # 是否启用智能截断
    enabled: true
    
    # 保留结构化标记
    preserve_markers: true
    
    # 截断指示器
    truncation_indicator: "... [截断]"
    
    # 各类别截断优先级（数字越小越优先截断）
    priority:
      弱连接: 1        # 最先截断
      个性化: 2
      认知辅助: 3
      任务管理: 4
      记忆经验: 5
      感知输入: 6
      基础设定: 99      # 几乎不截断
      预留: 100         # 不截断
