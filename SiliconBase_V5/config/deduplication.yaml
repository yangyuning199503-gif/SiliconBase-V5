# =============================================================================
# 数据去重配置 - Deduplication Configuration
# =============================================================================
# 用途：集中管理数据去重相关的所有参数
#
# 设计原则：
# - 静默失败：所有配置错误都会被记录并处理
# - 用户隔离：每个用户的缓存相互独立
# - 内存可控：限制缓存大小，防止内存泄漏
#
# Week 3 数据去重组件配置文件
# =============================================================================

deduplication:
  # ---------------------------------------------------------------------------
  # 视觉分析去重 - Visual Analysis Deduplication
  # ---------------------------------------------------------------------------
  visual_analysis:
    # enabled: 是否启用视觉分析去重
    enabled: true
    
    # cache_ttl: 缓存有效期（秒）
    # 建议值：3-10秒，太短会增加重复调用，太长会导致数据滞后
    cache_ttl: 5
    
    # user_isolated: 是否启用用户隔离
    # true: 每个用户的缓存独立，数据安全但内存占用更高
    # false: 共享缓存，内存效率高但需考虑数据隔离
    user_isolated: true
    
    # max_users: 最大用户数（用户隔离时有效）
    # 超过此限制将使用LRU淘汰最久未使用的用户缓存
    max_users: 100
    
    # max_cache_per_user: 每用户最大缓存数
    # 超过此限制将使用LRU淘汰最久未使用的缓存项
    max_cache_per_user: 50
    
    # hash_algorithm: 截图哈希算法
    # 可选值：perceptual(感知哈希), dhash(差值哈希), sha256(精确哈希)
    # perceptual: 推荐，对轻微变化不敏感，适合视觉分析去重
    hash_algorithm: perceptual
    
    # similarity_threshold: 相似度阈值（0-1）
    # 超过此阈值视为相同画面，直接返回缓存结果
    similarity_threshold: 0.95

  # ---------------------------------------------------------------------------
  # 监控配置 - Monitoring
  # ---------------------------------------------------------------------------
  monitoring:
    enabled: true
    
    # report_interval: 报告间隔（秒），0表示不自动报告
    report_interval: 0
    
    # memory_threshold_mb: 内存警告阈值（MB）
    memory_threshold_mb: 200
    
    # hit_rate_alert_threshold: 命中率告警阈值
    # 低于此命中率会触发告警
    hit_rate_alert_threshold: 0.1

  # ---------------------------------------------------------------------------
  # 回退策略 - Fallback Strategies
  # ---------------------------------------------------------------------------
  fallback:
    # 缓存出错时的处理策略
    # ignore: 忽略错误，继续执行
    # raise: 抛出异常
    # disable: 禁用去重功能
    on_cache_error: ignore
    
    # 内存超限时的处理策略
    # evict_lru: 淘汰最久未使用的缓存（LRU）
    # clear_all: 清空所有缓存
    # disable: 禁用去重功能
    on_memory_exceeded: evict_lru
