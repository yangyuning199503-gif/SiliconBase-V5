  ollama:
    base_url: http://localhost:11434
    model: qwen3:8b
    timeout: 120
  providers:
    ollama:
      timeout: 9999
  vision:
    backends:
      ollama:
        base_url: http://localhost:11434
        model: qwen3-vl:2b
    default_backend: ollama
    enabled: true
auth:
  # [CFG-001] 默认用户不再硬编码。若配置中未提供 default_users，
  # 系统启动时会为 admin 生成随机初始密码并保存到 data/.initial_password.txt，
  # 同时设置 require_password_change=True。
  enabled: true
  jwt:
    access_token_expire_minutes: 1440
    algorithm: HS256
    secret_key: dev-secret-key
database:
  postgresql:
    database: siliconbase
    host: localhost
    password: siliconbase123456789
    pool_size: 5
    port: 5432
    user: postgres
  type: postgresql
