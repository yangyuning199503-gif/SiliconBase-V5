[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers -ra
markers =
    unit: 单元测试 (Unit tests)
    integration: 集成测试 (Integration tests)
    e2e: 端到端测试 (End-to-end tests)
    slow: 慢测试 (Slow tests, skip by default)
    memory: 记忆系统相关测试
    tool: 工具系统相关测试
    event: 事件总线相关测试
    api: API相关测试
    security: 安全相关测试
    workflow: 工作流测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::RuntimeWarning
    # ignore::core.config.SecurityWarning  # 暂时注释，避免 pytest 启动时导入 core 模块触发 memory.py 的导入时序问题
    ignore::pytest.PytestReturnNotNoneWarning
    error::UserWarning
