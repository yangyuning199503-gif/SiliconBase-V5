# Redis 配置文件 for SiliconBase V5
# 基础配置
bind 0.0.0.0
port 6379

# 安全（Docker环境内部网络，可根据需要设置密码）
# requirepass your-redis-password

# 持久化配置
save 900 1
save 300 10
save 60 1000

# RDB 配置
dbfilename dump.rdb
dir /data
rdbcompression yes
rdbchecksum yes

# AOF 配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志
loglevel notice
logfile ""

# 客户端连接
timeout 0
tcp-keepalive 300
maxclients 1000

# 性能优化
hz 10
dynamic-hz yes
